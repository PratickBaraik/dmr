<!doctype html>
<html lang="en">
  <head>
    <!-- 🔤 Charset & Viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🧠 PRIMARY SEO -->
    <title>DMR | Run Beyond Limits</title>
    <meta
      name="description"
      content="Join a community of runners focused on endurance, consistency, and growth. Train together. Run stronger."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://your-domain.vercel.app/" />

    <!-- 🌐 OPEN GRAPH (SOCIAL SHARING) -->
    <meta property="og:title" content="DMR | Run Beyond Limits" />
    <meta
      property="og:description"
      content="Train with a community built for consistency, endurance, and growth."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.vercel.app/" />
    <meta property="og:image" content="/preview.png" />

    <!-- 🐦 TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DMR | Run Beyond Limits" />
    <meta
      name="twitter:description"
      content="Run stronger with a focused, growth-driven community."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- 🎯 FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ⚡ PERFORMANCE: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ⚡ PERFORMANCE: Preload Fonts -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
    />

    <!-- 🔤 Fonts (Non-blocking) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />

    <!-- 🎨 THEME -->
    <meta name="theme-color" content="#000000" />

    <!-- 📱 PWA (Optional but recommended) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- 🧱 PERFORMANCE: Reduce CLS -->
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body class="bg-black text-white">
    <noscript> You need to enable JavaScript to run this app. </noscript>

    <div id="root"></div>

    <!-- ⚙️ App Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
